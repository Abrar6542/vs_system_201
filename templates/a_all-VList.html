<!DOCTYPE html>
<html>
<head>
    
    <title>Voters List</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}" >
        <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='voting-box.png') }}">

</head>
<body>
    <header>
    <h1>AAB VOTING SOLUTIONS</h1>
  </header>
  <div class="dv">
        <h3>All Voters List</h3>
        
    <table>
       <thead>
        <tr>
            <th>Voter ID</th>
            <th>Name</th>
            <th>Date of Birth</th>
            <th>City</th>
            <th>Mobile Number</th>
            <th>Email</th>
            
        </tr>
       </thead>
       <tbody>
        {% for r in res %}
        <tr>
          <td>{{ r.v_id }}</td>
          <td>{{ r.f_name }} {{ r.l_name}}</td>
          <td>{{ r.dob }}</td>
          <td>{{ r.city }}</td>
          <td>{{ r.mob }}</td>
          <td>{{ r.email }}</td>
        </tr>
        {% endfor %}
       </tbody>
    </table>
    </div>
    <footer>
  <p>Designed and developed by : Abrar Baig</p>
</footer> 
</body>
</html>
